# Automated Contributor License Agreement (CLA) check.
#
# When someone opens a pull request, this bot asks them to agree to CLA.md by
# posting a comment. Their agreement is stored so they only sign once.
#
# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP (required before this works):
#
# 1. Create a GitHub Personal Access Token (classic) with the `repo` scope.
# 2. Add it to this repository as a secret named  PERSONAL_ACCESS_TOKEN
#    (Settings → Secrets and variables → Actions → New repository secret).
#    The bot uses it to record signatures in a file on the `cla-signatures`
#    branch of this same repo.
#
# Until the secret is set, the workflow simply does nothing (PRs are not blocked
# automatically — fall back to the manual line in CONTRIBUTING.md / CLA.md).
# ─────────────────────────────────────────────────────────────────────────────

name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    # Skip entirely if the token isn't configured yet, so the repo doesn't error.
    if: vars.CLA_ENABLED == 'true'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-document: 'https://github.com/${{ github.repository }}/blob/main/.github/CLA.md'
          path-to-signatures: 'signatures/cla.json'
          branch: 'cla-signatures'
          allowlist: 'dependabot[bot]'
          custom-notsigned-prcomment: >
            Thank you for your pull request! Before we can merge it, please read
            our [Contributor License Agreement](.github/CLA.md) and sign it by posting
            the comment below.
          custom-pr-sign-comment: 'I have read the CLA and I agree to it.'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you!'
