name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  core-build:
    name: Core package build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build core package
        run: swift build

      # Use xcodebuild (full Xcode toolchain) rather than `swift test`: on the CI
      # runner `swift test` loads the OLDER Command Line Tools Testing.framework at
      # runtime and crashes with "Symbol not found … Testing". xcodebuild uses
      # Xcode's matching swift-testing. (`make test` / swift test still works locally.)
      - name: Run core tests
        run: xcodebuild test -scheme FlowTranslateCore -destination 'platform=macOS'

  app-build:
    name: App build (Release)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild \
            -project FlowTranslate.xcodeproj \
            -scheme FlowTranslate \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
